name: Auto Update WiraAvia Map

on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:

# BARIS INI SANGAT PENTING AGAR ROBOT DIIZINKAN MENYIMPAN FILE INDEX.HTML
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Tarik Data Repository
        uses: actions/checkout@v3

      - name: Siapkan Lingkungan Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Modul (Requirements)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Eksekusi WiraAvia Engine
        run: python main.py

      - name: Simpan (Commit) & Push Perubahan ke index.html
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update Peta WiraAvia" && git push)
